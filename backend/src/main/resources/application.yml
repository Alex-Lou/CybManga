server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  servlet:
    context-path: /

spring:
  application:
    name: sumiwire

  profiles:
    active: dev

  main:
    banner-mode: off
    log-startup-info: false
    allow-bean-definition-overriding: true

  output:
    ansi:
      enabled: always

  # --- CONFIGURATION DATABASE CORRIGÉE ---
  datasource:
    # On simplifie : Juste AUTO_SERVER=TRUE. C'est le standard pour le mode fichier partagé.
    url: jdbc:h2:file:${user.home}/.manga-studio-pro/data/comicflow;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    # AJOUT CRUCIAL : On force le dialecte pour éviter l'erreur "Unable to determine Dialect"
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
        generate_statistics: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

logging:
  level:
    root: WARN
    com.mangastudio: INFO
    org.springframework: ERROR
    org.hibernate: ERROR
    com.zaxxer: ERROR

info:
  app:
    name: SumiWire
    description: Backend API for SumiWire
    version: 1.0.0