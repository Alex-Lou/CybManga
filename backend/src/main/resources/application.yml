server:
  port: 8080
  # App desktop : le backend ne sert que le front local. On lie l'écoute à la
  # boucle locale pour ne JAMAIS exposer l'API ni la console H2 sur le réseau (LAN).
  address: 127.0.0.1
  # Ne pas fuiter de détail interne dans la page d'erreur Spring par défaut.
  # (Les réponses API utiles passent par GlobalExceptionHandler, pas par ceci.)
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  servlet:
    context-path: /

spring:
  application:
    name: sumiwire

  profiles:
    active: dev

  main:
    banner-mode: off
    log-startup-info: false
    allow-bean-definition-overriding: true

  output:
    ansi:
      enabled: always

  # --- CONFIGURATION DATABASE CORRIGÉE ---
  datasource:
    # On simplifie : Juste AUTO_SERVER=TRUE. C'est le standard pour le mode fichier partagé.
    url: jdbc:h2:file:${user.home}/.manga-studio-pro/data/comicflow;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        # Jamais d'accès distant à la console DB (déjà bloqué par server.address,
        # ceci verrouille en défense en profondeur).
        web-allow-others: false

  jpa:
    # AJOUT CRUCIAL : On force le dialecte pour éviter l'erreur "Unable to determine Dialect"
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
        generate_statistics: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

logging:
  level:
    root: WARN
    com.mangastudio: INFO
    org.springframework: ERROR
    org.hibernate: ERROR
    com.zaxxer: ERROR

info:
  app:
    name: SumiWire
    description: Backend API for SumiWire
    version: 1.0.0

# Origines CORS autorisées (front en dev). Externalisé pour ne pas coder en dur
# dans CorsConfig — surchargeable par variable d'env APP_CORS_ALLOWED_ORIGINS.
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173